name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix"
        required: true
        default: "1.0.0"

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Swift tests
        run: swift test

      - name: Require release secrets
        run: |
          test -n "${CODE_SIGN_IDENTITY}"
          test -n "${APPLE_ID}"
          test -n "${APPLE_TEAM_ID}"
          test -n "${APPLE_APP_SPECIFIC_PASSWORD}"
          test -n "${APPLE_DEVELOPER_ID_CERTIFICATE_BASE64}"
          test -n "${APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD}"
          test -n "${DMGFORGE_CLI_URL}"
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          DMGFORGE_CLI_URL: ${{ secrets.DMGFORGE_CLI_URL }}

      - name: Import Developer ID certificate
        run: ./scripts/import-developer-id-certificate.sh
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}

      - name: Build signed app bundle
        run: ./scripts/build-app.sh
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Install DMGForge CLI
        run: |
          curl -L "${DMGFORGE_CLI_URL}" -o /tmp/dmgforge.zip
          unzip -q /tmp/dmgforge.zip -d /tmp/dmgforge
          sudo install -m 0755 /tmp/dmgforge/dmgforge /usr/local/bin/dmgforge
          dmgforge help
        env:
          DMGFORGE_CLI_URL: ${{ secrets.DMGFORGE_CLI_URL }}

      - name: Package DMG with DMGForge
        run: ./scripts/package-dmg.sh
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}

      - name: Notarize DMG
        run: ./scripts/notarize-dmg.sh "release/Exposé IP Address.dmg"
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: release/Exposé IP Address.dmg
